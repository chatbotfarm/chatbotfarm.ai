        alt="ChatbotFarm.ai"

    <!-- HAMBURGER -->
    <div id="nav-toggle" style="display:none;font-size:26px;color:white;cursor:pointer">
      ☰
    </div>

    <!-- NAV LINKS -->
    <div id="nav-menu" style="display:flex;align-items:center;gap:24px;margin-left:auto;margin-right:20px">

      <a href="/" style="color:var(--text);text-decoration:none;font-size:16px">Home</a>

<script>
  const toggle = document.getElementById('nav-toggle');
  const menu = document.getElementById('nav-menu');

  toggle.addEventListener('click', () => {
    if (menu.style.display === 'flex') {
      menu.style.display = 'none';
    } else {
      menu.style.display = 'flex';
      menu.style.flexDirection = 'column';
      menu.style.position = 'absolute';
      menu.style.top = '70px';
      menu.style.right = '20px';
      menu.style.background = '#111';
      menu.style.padding = '20px';
      menu.style.border = '1px solid rgba(255,255,255,0.1)';
      menu.style.borderRadius = '10px';
    }
  });

  function handleResize() {
    if (window.innerWidth < 768) {
      toggle.style.display = 'block';
      menu.style.display = 'none';
    } else {
      toggle.style.display = 'none';
      menu.style.display = 'flex';
      menu.style.position = 'static';
      menu.style.flexDirection = 'row';
      menu.style.background = 'none';
    }
  }

  window.addEventListener('resize', handleResize);
  handleResize();
</script>
